 <!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RAHMA TOP UP</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}
body{background:#2c3142;color:white;}
header{background:#e11d48;padding:15px;display:flex;justify-content:space-between;align-items:center;}
.logo{font-size:20px;font-weight:600;}
.login-btn{background:#2563eb;padding:6px 12px;border-radius:6px;cursor:pointer;}
.search{padding:15px;}
.search input{width:100%;padding:12px;border-radius:10px;border:none;}
.games{padding:15px;}
.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;}
.card{background:#1f2333;border-radius:15px;overflow:hidden;cursor:pointer;transition:0.3s;border:1px solid #374151;}
.card:hover{transform:scale(1.05);border-color:#e11d48;}
.card img{width:100%;height:100px;object-fit:cover;}
.title{padding:8px;text-align:center;font-size:12px;font-weight:600;}
.topup{display:none;padding:20px;}
.box{background:#1f2333;padding:15px;border-radius:10px;margin-bottom:15px;}
.box input{width:100%;padding:10px;border:none;border-radius:8px;margin-top:10px;background: #2c3142;color: white;}
.item-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-top:10px;max-height:350px;overflow:auto;}
.item-btn{background:#374151;padding:10px;border:none;border-radius:8px;color:white;cursor:pointer;font-size:11px;border: 1px solid transparent;}
.item-btn.active{background:#e11d48;border-color: white;}
.main-btn{width:100%;padding:12px;margin-top:10px;background:#22c55e;border:none;border-radius:8px;color:white;font-weight: bold;cursor: pointer;}
.back-btn{background:#374151;margin-bottom: 50px;}
#popup,#loginPopup,#historyPopup{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.8);justify-content:center;align-items:center;z-index: 999;}
.popup-box,.login-box{background:#1f2333;padding:20px;border-radius:10px;text-align:center;width:85%;max-width:350px;border: 1px solid #e11d48;}
.popup-btn{background:#e11d48;border:none;padding:10px 20px;color:white;border-radius:6px;cursor:pointer;margin-top:10px;}
.social-btn{width:100%;padding:10px;margin-top:10px;border:none;border-radius:8px;cursor:pointer;color:white;}
.google{background:#ea4335;}
.facebook{background:#1877f2;}
.twitter{background:#1da1f2;}
